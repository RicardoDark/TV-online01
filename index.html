<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV Premium Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="hls.min.js"></script>
</head>
<body>

    <video id="video-player" playsinline></video>

    <!-- Menu de canais -->
    <div id="overlay-menu" class="hidden">
        <div class="menu-container">
            <div class="column folders-column">
                <div class="column-header">
                    <h2>Pastas</h2>
                </div>
                <div class="list-container" id="folders-list"></div>
            </div>
            <div class="column channels-column">
                <div class="column-header">
                    <h2 id="current-folder-title">Canais</h2>
                </div>
                <div class="list-container" id="channels-list"></div>
            </div>
        </div>
    </div>

    <!-- ✅ Tela de Boas-Vindas Ativada -->
    <div id="splash-screen" class="splash-visible">
        <div class="splash-content">
            <h1 class="splash-title">IPTV PLAYER</h1>
            <p class="splash-subtitle">Clique no botão abaixo para começar a assistir com som</p>
            <button id="btn-start" class="btn-primary">INICIAR REPRODUÇÃO</button>
        </div>
    </div>

    <div id="status-container" class="hidden">
        <div class="spinner"></div>
        <div id="status-message">Carregando canais...</div>
    </div>

    <div id="toast-info" class="hidden">
        <div class="toast-channel-name" id="toast-channel-name">Nome do Canal</div>
        <div class="toast-channel-group" id="toast-channel-group">Grupo do Canal</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
