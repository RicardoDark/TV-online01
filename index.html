<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Premium Player</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Local HLS.js Library -->
    <script src="hls.min.js"></script>
</head>
<body>

    <!-- Fullscreen Video Player -->
    <video id="video-player" playsinline autoplay></video>

    <!-- Glassmorphic Overlay Menu -->
    <div id="overlay-menu" class="visible">
        <div class="menu-container">
            <!-- Left Side: Folders -->
            <div class="column folders-column">
                <div class="column-header">
                    <h2>Pastas</h2>
                </div>
                <div class="list-container" id="folders-list">
                    <!-- Folders will be injected here -->
                </div>
            </div>

            <!-- Right Side: Channels -->
            <div class="column channels-column">
                <div class="column-header">
                    <h2 id="current-folder-title">Canais</h2>
                </div>
                <div class="list-container" id="channels-list">
                    <!-- Channels will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Web Autoplay Bypass Splash Screen -->
    <div id="splash-screen" class="splash-visible">
        <div class="splash-content">
            <h1 class="splash-title">IPTV PLAYER</h1>
            <p class="splash-subtitle">Pressione o botão para iniciar com som</p>
            <button id="btn-start" class="btn-primary">INICIAR PLAYER</button>
        </div>
    </div>

    <!-- Status & Loading Overlay -->
    <div id="status-container" class="hidden">
        <div class="spinner"></div>
        <div id="status-message">Carregando canais...</div>
    </div>

    <!-- Action Bar / Info (shown briefly when channel changes) -->
    <div id="toast-info" class="hidden">
        <div class="toast-channel-name" id="toast-channel-name">Nome do Canal</div>
        <div class="toast-channel-group" id="toast-channel-group">Grupo do Canal</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
